<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Helmet Console</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="/vendor/xterm/xterm.css" />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body>
    <main class="app-shell" data-state="disconnected" data-view="terminal" id="appShell">
      <!-- TOPBAR -->
      <header class="topbar">
        <div class="brand">Helmet Console</div>
        <div class="topbar-actions">
          <div class="view-toggle" role="tablist" aria-label="主视图切换">
            <button type="button" role="tab" aria-pressed="true" data-view="terminal">终端</button>
            <button type="button" role="tab" aria-pressed="false" data-view="ai">AI助手</button>
            <button type="button" role="tab" aria-pressed="false" data-view="panel">面板</button>
          </div>
          <button class="icon-btn" type="button" aria-label="文档" data-action="docs">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
              <polyline points="14 2 14 8 20 8" />
              <line x1="8" y1="13" x2="16" y2="13" />
              <line x1="8" y1="17" x2="13" y2="17" />
              <polyline points="10 9 9 9 8 9" />
            </svg>
          </button>
          <button class="icon-btn" type="button" aria-label="终端侧栏" data-action="sidebar">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.75"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <polyline points="4 17 10 11 4 5" />
              <line x1="12" y1="19" x2="20" y2="19" />
            </svg>
          </button>
        </div>
      </header>

      <!-- CONNECTION BAR -->
      <form class="connection-bar" id="configForm" autocomplete="off" aria-label="连接状态">
        <span class="status-pill" data-variant="disconnected" id="statusPill">未连接</span>
        <input
          class="conn-url"
          id="wsUrl"
          name="url"
          type="text"
          placeholder="ws://host:port/path"
        />
        <button type="submit" class="conn-action" id="connAction" data-variant="solid">连接</button>
      </form>

      <!-- TERMINAL CARD -->
      <section class="terminal-card" aria-label="系统输出">
        <header class="terminal-card-header">
          <span class="terminal-label">SYSTEM OUTPUT</span>
          <div class="terminal-actions">
            <button class="icon-btn" type="button" aria-label="复制" data-action="copy">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2" />
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1" />
              </svg>
            </button>
            <button class="icon-btn" type="button" aria-label="全屏" data-action="expand">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <polyline points="15 3 21 3 21 9" />
                <polyline points="9 21 3 21 3 15" />
                <line x1="21" y1="3" x2="14" y2="10" />
                <line x1="3" y1="21" x2="10" y2="14" />
              </svg>
            </button>
          </div>
        </header>
        <div class="terminal-window">
          <div id="terminal"></div>
        </div>
        <p class="inline-error" id="inlineError"></p>
      </section>

      <!-- AI CARD -->
      <section class="ai-card" id="aiCard" aria-label="AI 助手">
        <header class="ai-config-bar" id="aiConfigBar" hidden>
          <span class="ai-config-key" id="aiConfigKey">🔑 未配置</span>
          <select class="ai-config-model" id="aiConfigModel" aria-label="模型">
            <option value="deepseek-v4-flash">deepseek-v4-flash</option>
            <option value="deepseek-v4-pro">deepseek-v4-pro</option>
          </select>
          <button type="button" class="ai-config-query" id="aiStatusQueryButton">
            📋 查询状态
          </button>
          <button type="button" class="ai-config-edit" id="aiConfigEdit">修改</button>
        </header>
        <form class="ai-config-form" id="aiConfigForm" autocomplete="off">
          <p class="ai-config-form-title" id="aiConfigFormTitle">
            🤖 配置 DeepSeek API Key 启用对话
          </p>
          <input
            type="password"
            id="aiKeyInput"
            class="ai-config-input"
            placeholder="sk-..."
            aria-label="DeepSeek API Key"
          />
          <input
            type="url"
            id="aiBaseUrlInput"
            class="ai-config-input"
            placeholder="https://api.deepseek.com"
            aria-label="API 地址"
          />
          <div class="ai-config-form-actions">
            <button type="submit" id="aiConfigSave" class="ai-config-save">保 存</button>
            <button type="button" id="aiConfigCancel" class="ai-config-cancel" hidden>取消</button>
          </div>
        </form>
        <div class="ai-bubbles" id="aiBubbles" hidden></div>
        <form class="ai-input-bar" id="aiInputForm" autocomplete="off">
          <textarea
            id="aiInput"
            class="ai-input"
            rows="1"
            placeholder="输入消息..."
            disabled
          ></textarea>
          <button type="submit" id="aiSendButton" class="ai-send-btn" disabled>发送</button>
        </form>
      </section>

      <!-- COMMAND BAR -->
      <form class="command-bar" id="commandForm" autocomplete="off">
        <span class="command-prompt" aria-hidden="true">&gt;</span>
        <textarea
          id="commandInput"
          class="command-input"
          name="command"
          placeholder="输入命令（如 led_on / motor_speed_3）..."
          rows="1"
        ></textarea>
        <button id="sendCommandButton" class="send-btn" type="submit" disabled>发送</button>
      </form>

      <!-- PANEL VIEW (LED + Motor + reserved data card) -->
      <section class="panel-view" id="panelView" aria-label="面板">
        <section class="control-cards" aria-label="设备控制">
          <article class="control-card">
            <header class="control-card-head">
              <h2>LED 阵列</h2>
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M9 18h6" />
                <path d="M10 22h4" />
                <path d="M2 12a10 10 0 0 1 20 0c0 4-3 6-3 8H5c0-2-3-4-3-8z" />
              </svg>
            </header>
            <div class="led-body">
              <div class="led-status" id="ledStatus" data-state="off">
                <span class="led-status-label">状态</span>
                <span class="led-status-value" id="ledStatusValue">已关闭</span>
              </div>
              <div class="led-toggle" role="group" aria-label="LED 开关">
                <button
                  type="button"
                  class="led-btn"
                  id="ledOnButton"
                  data-action="on"
                  aria-pressed="false"
                >
                  开启
                </button>
                <button
                  type="button"
                  class="led-btn"
                  id="ledOffButton"
                  data-action="off"
                  aria-pressed="true"
                >
                  关闭
                </button>
              </div>
            </div>
          </article>
          <article class="control-card motor-card">
            <header class="control-card-head">
              <h2>驱动电机</h2>
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.75"
                stroke-linecap="round"
                stroke-linejoin="round"
                aria-hidden="true"
              >
                <path d="M12 2v4" />
                <path d="m6.31 6.31 2.83 2.83" />
                <path d="M2 12h4" />
                <path d="M12 12l5-3" />
                <circle cx="12" cy="12" r="9" />
              </svg>
            </header>
            <div class="motor-body">
              <dl class="motor-display" id="motorDisplay" data-state="off">
                <div class="motor-display-row">
                  <dt>状态</dt>
                  <dd id="motorStateValue">已停止</dd>
                </div>
                <div class="motor-display-row">
                  <dt>目标档位</dt>
                  <dd id="motorGearValue">1</dd>
                </div>
                <div class="motor-display-row motor-display-row-muted">
                  <dt>实际转速</dt>
                  <dd>-- rpm <span class="motor-rpm-note">(待接入)</span></dd>
                </div>
              </dl>
              <div class="motor-controls">
                <div class="motor-control-row">
                  <span class="motor-control-label">开关</span>
                  <div class="motor-switch" role="group" aria-label="电机开关">
                    <button
                      type="button"
                      class="motor-switch-btn"
                      id="motorOnButton"
                      data-action="on"
                      aria-pressed="false"
                    >
                      开
                    </button>
                    <button
                      type="button"
                      class="motor-switch-btn"
                      id="motorOffButton"
                      data-action="off"
                      aria-pressed="true"
                    >
                      关
                    </button>
                  </div>
                </div>
                <div class="motor-control-row">
                  <span class="motor-control-label">挡位</span>
                  <div class="motor-gears" id="motorGears" role="group" aria-label="电机挡位">
                    <button type="button" class="motor-gear-btn" data-gear="1" aria-pressed="true">
                      1
                    </button>
                    <button type="button" class="motor-gear-btn" data-gear="2" aria-pressed="false">
                      2
                    </button>
                    <button type="button" class="motor-gear-btn" data-gear="3" aria-pressed="false">
                      3
                    </button>
                  </div>
                </div>
              </div>
            </div>
          </article>
        </section>
        <section class="data-card mq2-card" id="dataCard" aria-label="MQ2 烟雾趋势指数">
          <header class="mq2-card-head">
            <div>
              <p class="mq2-kicker">实时数据</p>
              <h2>MQ2 烟雾趋势指数</h2>
            </div>
            <span class="mq2-status" id="mq2Status">趋势正常</span>
          </header>
          <div class="mq2-hero" aria-live="polite">
            <strong class="mq2-current-value" id="mq2Value">--</strong>
            <div class="mq2-legend" aria-label="参考线">
              <span><i class="mq2-legend-clean"></i>清洁 100</span>
              <span><i class="mq2-legend-recovery"></i>恢复 130</span>
              <span><i class="mq2-legend-alarm"></i>报警 180</span>
            </div>
          </div>
          <div class="mq2-chart" id="mq2Chart"></div>
        </section>
      </section>
    </main>

    <script type="module" src="/js/main.js"></script>
  </body>
</html>
